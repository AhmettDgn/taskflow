name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.1
          run_install: false
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Build workspace
        run: pnpm build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    env:
      DEPLOY_HOST: ${{ secrets.REMOTE_HOST }}
      DEPLOY_USER: ${{ secrets.REMOTE_USER }}
      DEPLOY_PORT: 22
      DEPLOY_PATH: /home/yusuf/projects/taskflow

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?REMOTE_HOST secret is required}"
          : "${DEPLOY_USER:?REMOTE_USER secret is required}"

      - name: Add deploy host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Upload deploy script
        shell: bash
        run: |
          set -euo pipefail

          scp -P "${DEPLOY_PORT}" deploy/scripts/deploy-on-server.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/taskflow-deploy-on-server.sh"

      - name: Deploy on server
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -o BatchMode=yes -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod 700 /tmp/taskflow-deploy-on-server.sh && DEPLOY_PATH=${DEPLOY_PATH} DEPLOY_BRANCH=main GITHUB_SHA=${GITHUB_SHA} bash /tmp/taskflow-deploy-on-server.sh"
