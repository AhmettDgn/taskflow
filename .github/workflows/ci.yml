name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3021
      NEXT_PUBLIC_API_BASE_PATH: /api
      E2E_BASE_URL: http://127.0.0.1:3021
      E2E_BACKEND_BASE_URL: http://127.0.0.1:5021

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.11.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Cache Next build cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nextcache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Unit & integration tests
        run: pnpm --filter frontend test:vitest

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm --filter frontend exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm --filter frontend exec playwright test --grep "@smoke|@functional"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    env:
      DEPLOY_HOST: ${{ secrets.REMOTE_HOST }}
      DEPLOY_USER: ${{ secrets.REMOTE_USER }}
      DEPLOY_PORT: 22
      DEPLOY_PATH: /home/yusuf/projects/taskflow

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Validate deploy secrets
        shell: bash
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?REMOTE_HOST secret is required}"
          : "${DEPLOY_USER:?REMOTE_USER secret is required}"

      - name: Add deploy host to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.ssh"
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> "${HOME}/.ssh/known_hosts"

      - name: Upload deploy script
        shell: bash
        run: |
          set -euo pipefail

          scp -P "${DEPLOY_PORT}" deploy/scripts/deploy-on-server.sh \
            "${DEPLOY_USER}@${DEPLOY_HOST}:/tmp/taskflow-deploy-on-server.sh"

      - name: Deploy on server
        shell: bash
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          ssh -o BatchMode=yes -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "chmod 700 /tmp/taskflow-deploy-on-server.sh && DEPLOY_PATH=${DEPLOY_PATH} DEPLOY_BRANCH=main GITHUB_SHA=${GITHUB_SHA} bash /tmp/taskflow-deploy-on-server.sh"
