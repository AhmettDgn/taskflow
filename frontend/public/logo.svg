<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="glyphGrad" x1="12" y1="12" x2="28" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-opacity="0.25" flood-color="#000000" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="40" height="40" rx="10" fill="url(#bgGrad)" filter="url(#shadow)" />

  <!-- Flowing Ring + Task Checkmark Glyph -->
  <path d="M12 21.5C12 16.5 16 12.5 21 12.5C25.5 12.5 28.5 15.5 28.5 19.5" stroke="url(#glyphGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" />
  
  <!-- Main Checkmark forming the "T" and "F" flow -->
  <path d="M14.5 19.5L19.5 24.5L28.5 13.5" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Crossbar representing "T" -->
  <path d="M12.5 14H19.5" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" opacity="0.8" />
</svg>
