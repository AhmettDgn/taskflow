server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name taskflow.arslanyusuf.com;

  ssl_certificate /etc/letsencrypt/live/taskflow.arslanyusuf.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/taskflow.arslanyusuf.com/privkey.pem;

  location = /api {
    proxy_pass http://127.0.0.1:5021/api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  location /api/ {
    proxy_pass http://127.0.0.1:5021/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_redirect http://localhost:3021/ $scheme://$http_host/;
    proxy_redirect http://127.0.0.1:3021/ $scheme://$http_host/;
    proxy_redirect https://localhost:3021/ $scheme://$http_host/;
    proxy_redirect https://127.0.0.1:3021/ $scheme://$http_host/;
  }

  location / {
    proxy_pass http://127.0.0.1:3021;
    proxy_http_version 1.1;
    proxy_buffer_size 32k;
    proxy_buffers 8 32k;
    proxy_busy_buffers_size 64k;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_redirect http://localhost:3021/ $scheme://$http_host/;
    proxy_redirect http://127.0.0.1:3021/ $scheme://$http_host/;
    proxy_redirect https://localhost:3021/ $scheme://$http_host/;
    proxy_redirect https://127.0.0.1:3021/ $scheme://$http_host/;
  }
}

server {
  listen 80;
  listen [::]:80;
  server_name taskflow.arslanyusuf.com;

  return 301 https://$host$request_uri;
}

